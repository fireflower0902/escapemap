          run_script sync_escapecity_db.py
          run_script sync_teraspace_db.py
          run_script sync_xescape_db.py
          run_script sync_puzzlefactory_db.py

  # ── Job 4: 나머지 스크립트 ──────────────────────────────────────────────────
