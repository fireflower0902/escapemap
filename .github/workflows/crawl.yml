name: 방탈출 스케줄 크롤링

on:
  schedule:
    - cron: "0 */2 * * *"   # 2시간마다 — 스케줄만 갱신 (SKIP_META_WRITES=true, delta write)
    - cron: "0 15 * * *"    # 매일 자정 KST (UTC 15:00) — 카페/테마 포함 전체 동기화
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  crawl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Write Firebase credentials
        run: echo '${{ secrets.FIREBASE_CREDENTIALS_JSON }}' > firebase_credentials.json

      - name: Write .env
        run: |
          echo "DATABASE_URL=sqlite+aiosqlite:///./escape_aggregator.db" >> .env
          echo "FIREBASE_CREDENTIALS_PATH=./firebase_credentials.json" >> .env
          echo "ENVIRONMENT=production" >> .env
          # 자정 KST(0 15 * * *) 실행이 아닌 경우 카페/테마 쓰기 건너뜀 → write 절약
          if [ "${{ github.event.schedule }}" != "0 15 * * *" ]; then
            echo "SKIP_META_WRITES=true" >> .env
          fi

      - name: 크롤링 실행
        run: |
          uv run python scripts/sync_keyescape_db.py
          uv run python scripts/sync_xdungeon_db.py
          uv run python scripts/sync_doorescape_db.py
          uv run python scripts/sync_playtheworld_etc_db.py
          uv run python scripts/sync_fantastrick_db.py
          uv run python scripts/sync_masterkey_db.py
          uv run python scripts/sync_frankantique_db.py
          uv run python scripts/sync_dpsnnn_db.py
          uv run python scripts/sync_studioesc_db.py
          uv run python scripts/sync_mafiacafe_db.py
          uv run python scripts/sync_deepthinker_db.py
          uv run python scripts/sync_jigobyeol_db.py
          uv run python scripts/sync_xcape_db.py
          uv run python scripts/sync_nextedition_db.py
          uv run python scripts/sync_clevertown_db.py
          uv run python scripts/sync_play33_db.py
          uv run python scripts/sync_sinbiweb_db.py
          uv run python scripts/sync_rabbithole_db.py
          uv run python scripts/sync_seoulesc_db.py
          uv run python scripts/sync_showroom404_db.py
          uv run python scripts/sync_horrorswitch_db.py
          uv run python scripts/sync_zeroworld_db.py
          uv run python scripts/sync_mysteryroom_db.py
          uv run python scripts/sync_sherlock_db.py
          uv run python scripts/sync_cubeescape_db.py
          uv run python scripts/sync_xphobia_db.py
          uv run python scripts/sync_xescape_db.py
          uv run python scripts/sync_puzzlefactory_db.py
          uv run python scripts/sync_teraspace_db.py
          uv run python scripts/sync_escapers_db.py
          uv run python scripts/sync_lastescape_db.py
          uv run python scripts/sync_murderparker_db.py
          uv run python scripts/sync_seoulescaperoom_db.py
          uv run python scripts/sync_dumbndumber_db.py
          uv run python scripts/sync_secretcode_db.py
          uv run python scripts/sync_signescape_db.py
          uv run python scripts/sync_roomlescape_db.py
          uv run python scripts/sync_roomescape_db.py
