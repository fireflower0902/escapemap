            echo "::endgroup::"
          }

          # 머더파커 (지점 多 → 무거움)
          run_script sync_murderparker_db.py

          # 큐브이스케이프
          run_script sync_cubeescape_db.py

          # xcape (지점 多)
          run_script sync_xcape_db.py

          # 경기/인천/지방 계열
          run_script sync_escapers_db.py
