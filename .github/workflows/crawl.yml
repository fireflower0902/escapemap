name: 방탈출 스케줄 크롤링

on:
  schedule:
    - cron: "0 */2 * * *"   # 2시간마다 — 스케줄만 갱신 (SKIP_META_WRITES=true, delta write)
    - cron: "0 15 * * *"    # 매일 자정 KST (UTC 15:00) — 카페/테마 포함 전체 동기화
  workflow_dispatch:        # 수동 실행 버튼

# ── 공통 설정 ─────────────────────────────────────────────────────────────────
# 각 job은 독립적으로 ubuntu-latest runner에서 병렬 실행됩니다.
# 총 분(minutes) 소비량 = 기존 단일 job과 동일 (N개 runner × 짧은 시간 = 1개 × 긴 시간)
# 단, 벽시계 시간(wall-clock)은 ~4배 단축됩니다.

jobs:

  # ── Job 1: 셜록홈즈 + 서울 기타 ─────────────────────────────────────────────
  crawl-1:
    name: "크롤링 1 — 셜록홈즈 + 서울기타"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Write Firebase credentials
        run: echo '${{ secrets.FIREBASE_CREDENTIALS_JSON }}' > firebase_credentials.json

      - name: Write .env
        run: |
          echo "DATABASE_URL=sqlite+aiosqlite:///./escape_aggregator.db" >> .env
          echo "FIREBASE_CREDENTIALS_PATH=./firebase_credentials.json" >> .env
          echo "ENVIRONMENT=production" >> .env
          if [ "${{ github.event.schedule }}" != "0 15 * * *" ]; then
            echo "SKIP_META_WRITES=true" >> .env
          fi

      - name: 크롤링 실행
        run: |
          run_script() {
            local script="$1"
            echo "::group::$script"
            uv run python "scripts/$script" \
              && echo "✅ $script 완료" \
              || echo "::warning::❌ $script 크롤링 실패 (exit $?)"
            echo "::endgroup::"
          }

          # 셜록홈즈 (지점 多 → 무거움)
          run_script sync_sherlock_db.py

          # 서울 홍대/마포/신촌 계열
          run_script sync_keyescape_db.py
          run_script sync_frankantique_db.py
          run_script sync_dpsnnn_db.py
          run_script sync_clevertown_db.py
          run_script sync_rabbithole_db.py
          run_script sync_roomlescape_db.py
          run_script sync_ledasquare_db.py

          # 테마/장르 특화 소규모
          run_script sync_deepthinker_db.py
          run_script sync_showroom404_db.py
          run_script sync_horrorswitch_db.py
          run_script sync_mysteryroom_db.py
          run_script sync_xphobia_db.py

  # ── Job 2: 마스터키 + 서울 강남/잠실 계열 ────────────────────────────────────
  crawl-2:
    name: "크롤링 2 — 마스터키 + 강남/잠실"
    runs-on: ubuntu-latest
    defaults:
      run:
