            echo "::endgroup::"
          }

          # 마스터키 (지점 多 → 무거움)
          run_script sync_masterkey_db.py

          # 서울 강남/잠실/건대 계열
          run_script sync_xdungeon_db.py
          run_script sync_mafiacafe_db.py
          run_script sync_jigobyeol_db.py
          run_script sync_seoulesc_db.py
          run_script sync_zeroworld_db.py
          run_script sync_signescape_db.py
          run_script sync_studioesc_db.py

          # 기타 소규모
          run_script sync_nextedition_db.py
          run_script sync_sinbiweb_db.py
          run_script sync_play33_db.py
          run_script sync_seoulescaperoom_db.py

  # ── Job 3: 머더파커 + 큐브이스케이프 + 경기/지방 ─────────────────────────────
  crawl-3:
    name: "크롤링 3 — 머더파커 + 큐브 + 경기/지방"
    runs-on: ubuntu-latest
    defaults:
