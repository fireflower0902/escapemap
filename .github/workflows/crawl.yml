name: 방탈출 스케줄 크롤링

on:
  schedule:
    - cron: "0 * * * *"     # 1시간마다 — 스케줄만 갱신 (SKIP_META_WRITES=true, delta write)
    - cron: "0 15 * * *"    # 매일 자정 KST (UTC 15:00) — 카페/테마 포함 전체 동기화
  workflow_dispatch:        # 수동 실행 버튼

# ── 공통 설정 ─────────────────────────────────────────────────────────────────
# 10개 job 병렬 실행 → 벽시계 시간 ~10배 단축 (목표: 최장 job ≤ 15분)
# setup 시간(checkout + uv sync): job당 약 40~60초 소요

jobs:

  # ── Job 1: 셜록홈즈 (지점 多, 단독 실행) ─────────────────────────────────
  crawl-1:
    name: "크롤링 1 — 셜록홈즈"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: echo '${{ secrets.FIREBASE_CREDENTIALS_JSON }}' > firebase_credentials.json
      - name: Write .env
        run: |
          echo "DATABASE_URL=sqlite+aiosqlite:///./escape_aggregator.db" >> .env
          echo "FIREBASE_CREDENTIALS_PATH=./firebase_credentials.json" >> .env
          echo "ENVIRONMENT=production" >> .env
          if [ "${{ github.event.schedule }}" != "0 15 * * *" ]; then
            echo "SKIP_META_WRITES=true" >> .env
          fi
      - name: 크롤링 실행
        run: |
          run_script() {
            local script="$1"
            echo "::group::$script"
            uv run python "scripts/$script" \
              && echo "✅ $script 완료" \
              || echo "::warning::❌ $script 크롤링 실패 (exit $?)"
            echo "::endgroup::"
          }
          run_script sync_sherlock_db.py

  # ── Job 2: 마스터키 (지점 多, 단독 실행) ─────────────────────────────────
